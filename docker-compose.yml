services:
  app:
    build: .
    ports:
      - "3000:3000"
    container_name: "tekkipodi-app"
    networks:
      - proxy-net
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_USERNAME: ${AUTH_USERNAME}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

networks:
  proxy-net:
    external: true
